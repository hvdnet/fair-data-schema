name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy src/

      - name: Validate JSON files
        run: |
          uv run python -c "
          import json, pathlib, sys
          errors = []
          for p in list(pathlib.Path('schemas').rglob('*.json')) + list(pathlib.Path('examples').rglob('*.json')):
              try:
                  json.loads(p.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f'{p}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'All {len(list(pathlib.Path(\"schemas\").rglob(\"*.json\"))) + len(list(pathlib.Path(\"examples\").rglob(\"*.json\")))} JSON files valid')
          "

      - name: Run pytest
        run: uv run pytest --tb=short
