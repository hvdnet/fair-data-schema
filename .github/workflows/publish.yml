name: Publish Schemas to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies (docs extras)
        run: uv sync --extra docs

      - name: Build Sphinx docs
        run: uv run sphinx-build docs/source docs/build

      - name: Prepare Content
        run: |
          uv run python scripts/build_dist.py
          # Create a ZIP for manual distribution
          cd dist && zip -r ../fair-data-schema-dist.zip .
          cd ..
          # Copy to artifact path expected by next step
          cp -r dist site

      - name: Upload Downloadable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: fair-data-schema-dist
          path: fair-data-schema-dist.zip

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
