[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fair-data-schema"
version = "0.1.0"
description = "JSON Schema dialect and vocabularies for FAIR datasets"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Pascal Heus", email = "pascal@highvaluedata.net" }]
requires-python = ">=3.12"
dependencies = [
    "jsonschema>=4.23",
    "referencing>=0.35",
    "typer>=0.12",
    "rich>=13",
]

[project.scripts]
fair-data-schema = "fair_data_schema.cli:app"

[project.optional-dependencies]
dev = ["ruff>=0.4", "mypy>=1.10", "pytest>=8", "pytest-cov>=5", "pre-commit>=3"]
models = ["pydantic>=2"]
docs = [
    "sphinx==7.4.7",
    "myst-parser>=3",
    "sphinx-book-theme>=1.1",
    "sphinx-design>=0.6",
    "sphinx-autodoc-typehints>=2",
    "sphinxcontrib-mermaid>=1",
    "markdown>=3.6",
    "docutils<0.21",
    "sphinx-rtd-theme>=2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fair_data_schema"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "N", "ANN"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# Auto-generated files — alias strings can exceed line-length limit
"schemas/**/models.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
files = ["src", "tests", "scripts"]
exclude = ["schemas/.*/python/models.py"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
pythonpath = ["src"]

[tool.coverage.run]
source = ["src/fair_data_schema"]

[dependency-groups]
dev = ["types-jsonschema>=4.26.0.20260202", "types-Markdown>=3.7", "pydantic>=2", "jinja2>=3"]
